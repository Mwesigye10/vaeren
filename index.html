<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#8a6a3a">
<meta name="description" content="Et rum at se i. Reflekterende spørgsmål, stilhed og indre undersøgelse.">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Væren">
<title>Væren · Tillvaron · Væren</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f5f2ec;--surface:#edeae3;--border:#d8d2c8;--border2:#c8c0b0;
    --gold:#8a6a3a;--gold-dim:#a07840;--gold-dark:#c8a870;
    --text:#2a2420;--text-dim:#5a4e40;--text-faint:#8a7e6e;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Lato',sans-serif;font-weight:300;min-height:100vh;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:-50%;width:200%;height:200%;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");opacity:.015;animation:grain 8s steps(10) infinite;pointer-events:none;z-index:0;}
  body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at center,transparent 40%,#f5f2ec 100%);pointer-events:none;z-index:0;}
  @keyframes grain{0%,100%{transform:translate(0,0)}10%{transform:translate(-2%,-3%)}30%{transform:translate(2%,1%)}50%{transform:translate(-1%,2%)}70%{transform:translate(3%,-1%)}90%{transform:translate(-2%,3%)}}
  @keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  @keyframes fadeInSlow{from{opacity:0}to{opacity:1}}
  @keyframes breathe{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.12}50%{transform:translate(-50%,-50%) scale(1.12);opacity:.2}}
  @keyframes breatheIn{0%,100%{transform:translate(-50%,-50%) scale(.85);opacity:.18}50%{transform:translate(-50%,-50%) scale(1.25);opacity:.32}}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
  @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  @keyframes slowFade{from{opacity:0}to{opacity:1}}

  .screen{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center;animation:fadeIn 1s ease forwards;}
  .hidden{display:none!important;}

  /* LANG */
  .lang-eyebrow{font-size:10px;letter-spacing:.28em;text-transform:uppercase;color:var(--text-faint);margin-bottom:48px;}
  .lang-title{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:52px;color:var(--text);letter-spacing:.06em;line-height:1;margin-bottom:56px;}
  .lang-title span{color:var(--gold-dim);}
  .lang-btns{display:flex;flex-direction:column;gap:12px;width:100%;max-width:280px;margin-bottom:40px;}
  .lang-btn{font-family:'Lato',sans-serif;font-weight:300;font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);border:1px solid var(--gold-dark);padding:16px 32px;background:transparent;cursor:pointer;transition:all .35s ease;}
  .lang-btn:hover{border-color:var(--gold-dim);background:rgba(200,184,150,.04);}
  .lang-btn-om{font-family:'Lato',sans-serif;font-weight:300;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--text-faint);border:1px solid var(--border2);padding:12px 32px;background:transparent;cursor:pointer;margin-top:8px;transition:all .35s ease;}
  .lang-btn-om:hover{color:var(--gold-dim);border-color:var(--gold-dark);}

  /* DISCLAIMER */
  .disclaimer-box{max-width:480px;width:100%;border:1px solid var(--border2);background:var(--surface);padding:40px 36px;margin:32px 0;}
  .disclaimer-title{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:13px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold-dim);margin-bottom:24px;}
  .disclaimer-text{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;font-size:17px;color:var(--text-dim);line-height:1.8;margin-bottom:20px;}
  .crisis-link{display:block;font-size:11px;letter-spacing:.12em;color:var(--text-faint);text-decoration:none;margin-top:8px;transition:color .3s;}
  .crisis-link:hover{color:var(--gold-dim);}
  .disclaimer-actions{display:flex;flex-direction:column;gap:12px;align-items:center;width:100%;max-width:320px;}

  /* BREATH (3 vejrtrækninger) */
  .breath-screen-orb{position:fixed;top:50%;left:50%;width:280px;height:280px;border-radius:50%;background:radial-gradient(circle,rgba(138,106,58,.18) 0%,rgba(138,106,58,.04) 60%,transparent 80%);pointer-events:none;z-index:0;transform:translate(-50%,-50%);transition:transform 4s ease-in-out,opacity 4s ease-in-out;opacity:.2;}
  .breath-screen-orb.in{transform:translate(-50%,-50%) scale(1.4);opacity:.4;}
  .breath-screen-orb.out{transform:translate(-50%,-50%) scale(.7);opacity:.15;}
  .breath-instruction{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;font-size:36px;color:var(--text);letter-spacing:.04em;z-index:2;transition:opacity .8s ease;min-height:50px;}
  .breath-counter{font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--text-faint);margin-top:48px;z-index:2;min-height:14px;}
  .breath-skip{position:fixed;top:24px;right:24px;font-family:'Lato',sans-serif;font-weight:300;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--text-faint);background:transparent;border:none;cursor:pointer;padding:8px;z-index:3;}
  .breath-skip:hover{color:var(--gold-dim);}

  /* CATEGORIES */
  .cat-eyebrow{font-size:10px;letter-spacing:.25em;text-transform:uppercase;color:var(--text-faint);margin-bottom:28px;}
  .cat-intro{font-family:'Cormorant Garamond',serif;font-weight:300;font-style:italic;font-size:24px;color:var(--text-dim);margin-bottom:40px;line-height:1.6;max-width:400px;}
  .cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:480px;width:100%;margin-bottom:12px;}
  .cat-btn{font-family:'Lato',sans-serif;font-weight:300;font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--text-dim);border:1px solid var(--border2);padding:20px 12px;background:transparent;cursor:pointer;transition:all .35s ease;line-height:1.9;}
  .cat-btn:hover{border-color:var(--gold-dark);color:var(--gold);background:rgba(200,184,150,.03);}
  .cat-btn-surprise{font-family:'Cormorant Garamond',serif;font-weight:300;font-style:italic;font-size:20px;color:var(--gold);border:1px solid var(--gold-dark);padding:22px 32px;background:transparent;cursor:pointer;transition:all .35s ease;max-width:480px;width:100%;margin-top:8px;}
  .cat-btn-surprise:hover{background:rgba(200,184,150,.05);border-color:var(--gold-dim);}
  .cat-modes{max-width:480px;width:100%;margin-top:24px;display:flex;flex-direction:column;gap:8px;}
  .cat-mode-btn{font-family:'Lato',sans-serif;font-weight:300;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--text-faint);border:1px solid var(--border);padding:14px 24px;background:transparent;cursor:pointer;transition:all .35s ease;}
  .cat-mode-btn:hover{color:var(--gold-dim);border-color:var(--gold-dark);}
  .cat-mode-btn .mode-sub{display:block;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:13px;letter-spacing:.04em;text-transform:none;color:var(--text-faint);margin-top:6px;}

  /* QUESTIONS */
  .breath-orb{position:fixed;top:50%;left:50%;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(138,106,58,.08) 0%,transparent 70%);animation:breathe 7s ease-in-out infinite;pointer-events:none;z-index:0;}
  .q-header{display:flex;justify-content:space-between;align-items:center;width:100%;max-width:560px;margin-bottom:36px;z-index:1;}
  .q-logo{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:18px;color:var(--text-faint);letter-spacing:.1em;cursor:pointer;}
  .q-cat-label{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--text-faint);}
  .q-counter{font-size:10px;letter-spacing:.25em;text-transform:uppercase;color:var(--text-faint);margin-bottom:32px;z-index:1;}
  .q-box{max-width:520px;width:100%;z-index:1;margin-bottom:24px;}
  .q-text{font-family:'Cormorant Garamond',serif;font-weight:300;font-style:italic;font-size:clamp(22px,4vw,30px);color:var(--text);line-height:1.65;min-height:100px;}
  .q-cursor{animation:blink 1.1s infinite;color:var(--gold-dim);font-style:normal;}
  .q-deeper{max-width:520px;width:100%;z-index:1;margin-bottom:24px;min-height:30px;}
  .q-deeper-text{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;font-size:18px;color:var(--gold);line-height:1.65;animation:slowFade 1.4s ease forwards;opacity:0;}
  .q-hint{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:15px;color:var(--text-faint);margin-bottom:28px;z-index:1;line-height:1.7;}
  .q-actions{display:flex;gap:8px;margin-bottom:20px;z-index:1;flex-wrap:wrap;justify-content:center;}
  .q-action-btn{font-family:'Lato',sans-serif;font-weight:300;font-size:10px;letter-spacing:.18em;text-transform:uppercase;cursor:pointer;transition:all .35s;padding:10px 18px;border:1px solid var(--border);background:transparent;color:var(--text-faint);}
  .q-action-btn:hover{color:var(--gold-dim);border-color:var(--gold-dark);}
  .q-nav{display:flex;align-items:center;gap:12px;z-index:1;flex-wrap:wrap;justify-content:center;}
  .q-btn{font-family:'Lato',sans-serif;font-weight:300;font-size:11px;letter-spacing:.18em;text-transform:uppercase;cursor:pointer;transition:all .35s;padding:13px 22px;border:1px solid var(--border2);background:transparent;color:var(--text-faint);}
  .q-btn:hover{color:var(--text-dim);border-color:var(--gold-dark);}
  .q-btn-gold{color:var(--gold);border-color:var(--gold-dark);}
  .q-btn-gold:hover{background:rgba(200,184,150,.05);border-color:var(--gold-dim);color:var(--gold);}
  .q-btn-cats{font-size:10px;margin-top:20px;color:var(--text-faint);border-color:var(--border);z-index:1;}

  /* SILENCE / STILLE TID */
  .silence-eyebrow{font-size:10px;letter-spacing:.28em;text-transform:uppercase;color:var(--text-faint);margin-bottom:24px;}
  .silence-title{font-family:'Cormorant Garamond',serif;font-weight:300;font-style:italic;font-size:28px;color:var(--text-dim);margin-bottom:48px;line-height:1.5;max-width:400px;}
  .silence-options{display:flex;gap:12px;margin-bottom:32px;flex-wrap:wrap;justify-content:center;}
  .silence-opt{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:22px;color:var(--gold);border:1px solid var(--gold-dark);padding:24px 36px;background:transparent;cursor:pointer;transition:all .35s ease;min-width:90px;}
  .silence-opt:hover{background:rgba(200,184,150,.05);border-color:var(--gold-dim);}
  .silence-opt-sub{display:block;font-family:'Lato',sans-serif;font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--text-faint);margin-top:6px;}

  /* SILENCE TIMER */
  .timer-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;}
  .timer-orb{position:fixed;top:50%;left:50%;width:320px;height:320px;border-radius:50%;background:radial-gradient(circle,rgba(138,106,58,.14) 0%,rgba(138,106,58,.04) 60%,transparent 80%);animation:breathe 7s ease-in-out infinite;pointer-events:none;z-index:0;}
  .timer-display{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:42px;color:var(--text-dim);letter-spacing:.06em;z-index:2;}
  .timer-hint{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:15px;color:var(--text-faint);margin-top:20px;z-index:2;}
  .timer-skip{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);font-family:'Lato',sans-serif;font-weight:300;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--text-faint);background:transparent;border:none;cursor:pointer;padding:12px 24px;z-index:3;}
  .timer-skip:hover{color:var(--gold-dim);}
  .timer-complete{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;font-size:26px;color:var(--text-dim);text-align:center;line-height:1.6;max-width:380px;animation:slowFade 2s ease forwards;}

  /* WHISPER */
  .whisper-eyebrow{font-size:10px;letter-spacing:.28em;text-transform:uppercase;color:var(--text-faint);margin-bottom:64px;z-index:2;}
  .whisper-text{font-family:'Cormorant Garamond',serif;font-weight:300;font-style:italic;font-size:clamp(22px,4.4vw,32px);color:var(--text);line-height:1.65;max-width:540px;z-index:2;animation:slowFade 1.6s ease forwards;}
  .whisper-actions{margin-top:80px;display:flex;gap:12px;flex-wrap:wrap;justify-content:center;z-index:2;}
  .whisper-tap{position:absolute;inset:0;cursor:pointer;z-index:1;}

  /* CLOSE */
  .close-text{font-family:'Cormorant Garamond',serif;font-weight:300;font-style:italic;font-size:clamp(20px,3.5vw,28px);color:var(--text-dim);line-height:1.7;max-width:420px;margin-bottom:48px;white-space:pre-line;}

  /* ABOUT */
  .about-box{max-width:480px;width:100%;border-left:1px solid var(--border2);padding:0 0 0 32px;margin:40px 0 48px;text-align:left;}
  .about-text{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;font-size:20px;color:var(--text-dim);line-height:1.85;margin-bottom:32px;}
  .about-sig{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:16px;color:var(--text-faint);letter-spacing:.05em;}

  .btn-ghost{font-family:'Lato',sans-serif;font-weight:300;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);border:1px solid var(--gold-dark);padding:14px 36px;background:transparent;cursor:pointer;transition:all .35s;}
  .btn-ghost:hover{border-color:var(--gold-dim);background:rgba(200,184,150,.04);}
  .btn-ghost-soft{color:var(--text-faint);border-color:var(--border2);font-size:10px;}
  .logo-small{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:18px;color:var(--text-faint);letter-spacing:.1em;margin-bottom:56px;z-index:1;}
  .footer{position:fixed;bottom:20px;left:0;right:0;text-align:center;font-size:10px;letter-spacing:.1em;color:var(--border2);z-index:2;pointer-events:none;}

  @media(max-width:480px){
    .disclaimer-box{padding:28px 24px}
    .cat-grid{grid-template-columns:1fr}
    .about-box{padding-left:20px}
    .silence-opt{padding:20px 28px;min-width:80px;}
    .breath-screen-orb{width:220px;height:220px;}
  }
</style>
</head>
<body>

<!-- LANG SCREEN -->
<div id="screen-lang">
  <div class="screen" id="lang-hero" style="min-height:100vh;">
    <p class="lang-eyebrow">Vælg dit sprog · Välj ditt språk · Velg ditt språk</p>
    <h1 class="lang-title">Væren<span> · </span>Tillvaron</h1>
    <div class="lang-btns">
      <button class="lang-btn" onclick="setLang('da')">Dansk</button>
      <button class="lang-btn" onclick="setLang('sv')">Svenska</button>
      <button class="lang-btn" onclick="setLang('no')">Norsk</button>
      <button class="lang-btn-om" onclick="scrollToAboutLang()">Om ↓</button>
    </div>
  </div>
  <div id="lang-about-section" style="position:relative;z-index:1;max-width:480px;margin:0 auto;padding:80px 24px 120px;text-align:left;">
    <p style="font-size:10px;letter-spacing:.25em;text-transform:uppercase;color:#8a7e6e;margin-bottom:40px;font-family:'Lato',sans-serif;font-weight:300;">Om · About</p>
    <div style="border-left:1px solid #c8c0b0;padding-left:32px;">
      <p id="lang-about-text" style="font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;font-size:20px;color:#5a4e40;line-height:1.85;margin-bottom:32px;">Der er intet at blive. Kun det at være. Denne app er en invitation til at se det – sammen.</p>
      <p style="font-family:'Cormorant Garamond',serif;font-weight:300;font-size:16px;color:#8a7e6e;letter-spacing:.05em;">— Nicholas Mwesigye</p>
    </div>
    <div style="margin-top:60px;text-align:center;">
      <button onclick="scrollToTop()" style="font-family:'Lato',sans-serif;font-weight:300;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:#8a7e6e;background:none;border:none;cursor:pointer;">↑ Tilbage til sprog</button>
    </div>
  </div>
</div>

<!-- DISCLAIMER -->
<div id="screen-disclaimer" class="screen hidden">
  <p class="lang-eyebrow" id="d-eyebrow"></p>
  <div class="disclaimer-box">
    <p class="disclaimer-title" id="d-title"></p>
    <p class="disclaimer-text" id="d-text"></p>
    <p class="disclaimer-text" id="d-crisis-label"></p>
    <a class="crisis-link" id="d-crisis-dk" href="https://livslinjen.dk" target="_blank" rel="noopener"></a>
    <a class="crisis-link" id="d-crisis-se" href="https://mind.se" target="_blank" rel="noopener"></a>
    <a class="crisis-link" id="d-crisis-no" href="https://mentalhelse.no" target="_blank" rel="noopener"></a>
  </div>
  <div class="disclaimer-actions">
    <button class="btn-ghost" id="d-btn-breath" onclick="showBreath()"></button>
    <button class="btn-ghost btn-ghost-soft" id="d-btn" onclick="showCategories()"></button>
  </div>
</div>

<!-- BREATH (Tre vejrtrækninger) -->
<div id="screen-breath" class="screen hidden">
  <button class="breath-skip" id="b-skip" onclick="skipBreath()"></button>
  <div class="breath-screen-orb" id="b-orb"></div>
  <p class="breath-instruction" id="b-instruction"></p>
  <p class="breath-counter" id="b-counter"></p>
</div>

<!-- CATEGORIES -->
<div id="screen-categories" class="screen hidden">
  <p class="cat-eyebrow" id="cat-eyebrow"></p>
  <p class="cat-intro" id="cat-intro"></p>
  <div class="cat-grid" id="cat-grid"></div>
  <button class="cat-btn-surprise" id="cat-surprise" onclick="surpriseMe()"></button>
  <div class="cat-modes">
    <button class="cat-mode-btn" id="cat-daily" onclick="showDaily()"></button>
    <button class="cat-mode-btn" id="cat-whisper" onclick="showWhisper()"></button>
  </div>
</div>

<!-- QUESTIONS -->
<div id="screen-question" class="screen hidden" style="justify-content:flex-start;padding-top:48px;">
  <div class="breath-orb"></div>
  <div class="q-header">
    <span class="q-logo" id="q-logo" onclick="showCategories()"></span>
    <span class="q-cat-label" id="q-cat-label"></span>
  </div>
  <p class="q-counter" id="q-counter"></p>
  <div class="q-box">
    <p class="q-text" id="q-text"><span class="q-cursor">|</span></p>
  </div>
  <div class="q-deeper" id="q-deeper"></div>
  <p class="q-hint" id="q-hint"></p>
  <div class="q-actions">
    <button class="q-action-btn" id="q-deeper-btn" onclick="goDeeper()"></button>
    <button class="q-action-btn" id="q-silence-btn" onclick="showSilence()"></button>
  </div>
  <div class="q-nav">
    <button class="q-btn" id="q-prev" onclick="prevQ()"></button>
    <button class="q-btn q-btn-gold" id="q-next" onclick="nextQ()"></button>
  </div>
  <button class="q-btn q-btn-cats" id="q-cats" onclick="showCategories()"></button>
</div>

<!-- SILENCE PICKER -->
<div id="screen-silence" class="screen hidden">
  <p class="silence-eyebrow" id="s-eyebrow"></p>
  <p class="silence-title" id="s-title"></p>
  <div class="silence-options">
    <button class="silence-opt" onclick="startTimer(60)">1<span class="silence-opt-sub" id="s-min1"></span></button>
    <button class="silence-opt" onclick="startTimer(180)">3<span class="silence-opt-sub" id="s-min3"></span></button>
    <button class="silence-opt" onclick="startTimer(300)">5<span class="silence-opt-sub" id="s-min5"></span></button>
  </div>
  <button class="q-btn q-btn-cats" id="s-back" onclick="backToQuestion()"></button>
</div>

<!-- SILENCE TIMER -->
<div id="screen-timer" class="screen hidden timer-screen">
  <div class="timer-orb"></div>
  <p class="timer-display" id="t-display">00:00</p>
  <p class="timer-hint" id="t-hint"></p>
  <button class="timer-skip" id="t-skip" onclick="endTimer()"></button>
</div>

<!-- WHISPER -->
<div id="screen-whisper" class="screen hidden" style="position:relative;justify-content:center;">
  <div class="breath-orb"></div>
  <div class="whisper-tap" id="w-tap" onclick="nextWhisper()"></div>
  <p class="whisper-eyebrow" id="w-eyebrow"></p>

    daily:"Dagens spørsmål",dailySub:"Ett spørsmål for denne dagen",dailyDone:"Du har møtt dagens",dailyDoneSub:"Kom tilbake i morgen",
    whisperLabel:"Visdomshvisken",whisperSub:"En setning å sitte med",whisperEyebrow:"Visdomshvisken",whisperNext:"Ny hvisken",
    counter:(i,n)=>`Spørsmål ${i} av ${n}`,counterSingle:"Dagens spørsmål",
    hint:"Sitt med det. La det lande.",
    deeperBtn:"Gå dypere",silenceBtn:"Stille tid",
    silenceEyebrow:"Stille tid",silenceTitle:"Bli et øyeblikk. La spørsmålet arbeide.",silenceMin:"minutt",silenceMins:"minutter",silenceBack:"← Tilbake til spørsmålet",silenceComplete:"Du er her igjen.",silenceSkip:"Vend tilbake tidlig",
    prev:"← Forrige",next:"Neste →",backToCats:"← Temaer",close:"Du trenger ikke finne svaret.\nDet er nok å ha kjent spørsmålet.",moreCats:"Utforsk et annet tema",restart:"Vend tilbake til start",footer:"Ingen data lagret · Ingen konto · Ingen algoritme",
    about:{text:"Det er ingenting å bli. Bare det å være. Denne appen er en invitasjon til å se det – sammen.",back:"Vend tilbake"}}
};

// ====== STATE ======
let lang='da', currentQ=0, currentCat=null, lastSurpriseCat=null, typing=null;
let dailyMode=false, dailyQuestion=null;
let breathTimer=null, breathStep=0;
let timerInterval=null, timerEndTime=0;
let whisperIdx=0, lastWhisperIdx=-1;
const catKeys=['selvindsigt','frygt','tid','sind','forhold','ensomhed','kaerlighed','frihed','enhed'];

// ====== LANG ======
function setLang(l){
  lang=l;
  document.documentElement.lang=l;
  document.getElementById('lang-about-text').textContent=ui[l].about.text;
  showDisclaimer();
}

function showDisclaimer(){
  hide('screen-lang');
  const d=ui[lang].disclaimer;
  setText('d-eyebrow',d.eyebrow);setText('d-title',d.title);setText('d-text',d.text);
  setText('d-crisis-label',d.crisisLabel);setText('d-crisis-dk',d.crisisDk);
  setText('d-crisis-se',d.crisisSe);setText('d-crisis-no',d.crisisNo);
  setText('d-btn-breath',d.btnBreath);setText('d-btn',d.btn);
  setText('footer-text',ui[lang].footer);
  show('screen-disclaimer');
}

// ====== BREATH ======
function showBreath(){
  hideAll();
  setText('b-skip',ui[lang].breath.skip);
  setText('b-instruction','');
  setText('b-counter','');
  show('screen-breath');
  breathStep=0;
  setTimeout(()=>runBreath(),600);
}

function runBreath(){
  const total=3;
  const breath=ui[lang].breath;
  if(breathStep>=total){
    setText('b-instruction',breath.done);
    setText('b-counter','');
    document.getElementById('b-orb').className='breath-screen-orb';
    setTimeout(()=>showCategories(),1800);
    return;
  }
  breathStep++;
  setText('b-counter',breath.counter(breathStep,total));
  // In phase
  setText('b-instruction',breath.in);
  document.getElementById('b-orb').className='breath-screen-orb in';
  // Out phase after 4s
  breathTimer=setTimeout(()=>{
    setText('b-instruction',breath.out);
    document.getElementById('b-orb').className='breath-screen-orb out';
    breathTimer=setTimeout(()=>runBreath(),4200);
  },4200);
}

function skipBreath(){
  if(breathTimer)clearTimeout(breathTimer);
  showCategories();
}

// ====== CATEGORIES ======
function showCategories(){
  if(breathTimer)clearTimeout(breathTimer);
  hideAll();
  const c=ui[lang], cats=categories[lang];
  setText('cat-eyebrow',c.catEyebrow);
  setText('cat-intro',c.catIntro);
  setText('cat-surprise',c.surprise);
  const grid=document.getElementById('cat-grid');
  grid.innerHTML='';
  cats.forEach(cat=>{
    const btn=document.createElement('button');
    btn.className='cat-btn';
    btn.innerHTML=`${cat.icon}<br>${cat.label}<br><span style="font-size:9px;color:var(--text-faint);letter-spacing:.1em;">${cat.desc}</span>`;
    btn.onclick=()=>startCategory(cat.key);
    grid.appendChild(btn);
  });
  // Daily button
  const dailyBtn=document.getElementById('cat-daily');
  const seenToday=hasSeenDaily();
  if(seenToday){
    dailyBtn.innerHTML=`${c.dailyDone}<span class="mode-sub">${c.dailyDoneSub}</span>`;
  }else{
    dailyBtn.innerHTML=`${c.daily}<span class="mode-sub">${c.dailySub}</span>`;
  }
  // Whisper button
  document.getElementById('cat-whisper').innerHTML=`${c.whisperLabel}<span class="mode-sub">${c.whisperSub}</span>`;
  show('screen-categories');
}

function surpriseMe(){
  const available=catKeys.filter(k=>k!==lastSurpriseCat);
  const pick=available[Math.floor(Math.random()*available.length)];
  lastSurpriseCat=pick;
  const qs=[...questions[lang][pick]];
  for(let i=qs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[qs[i],qs[j]]=[qs[j],qs[i]];}
  questions[lang][pick]=qs;
  startCategory(pick);
}

function startCategory(catKey){
  dailyMode=false;
  currentCat=catKey;
  currentQ=0;
  renderQuestion();
  show('screen-question');
}

// ====== DAILY ======
function getDateSeed(){
  const d=new Date();
  return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
}

function hasSeenDaily(){
  try{
    const last=localStorage.getItem('vaeren-daily-seen');
    return last===getDateSeed();
  }catch(e){return false;}
}

function markDailySeen(){
  try{localStorage.setItem('vaeren-daily-seen',getDateSeed());}catch(e){}
}

function getDailyQuestion(){
  // Deterministic across the day, distinct from previous days
  const seed=getDateSeed();
  let hash=0;
  for(let i=0;i<seed.length;i++){hash=((hash<<5)-hash+seed.charCodeAt(i))|0;}
  // Flatten all questions in current language
  const all=[];
  catKeys.forEach(k=>{
    questions[lang][k].forEach(q=>all.push({cat:k,q}));
  });
  const idx=Math.abs(hash)%all.length;
  return all[idx];
}

function showDaily(){
  const item=getDailyQuestion();
  dailyQuestion=item.q;
  dailyMode=true;
  currentCat=item.cat;
  currentQ=0;
  markDailySeen();
  renderQuestion();
  show('screen-question');
}

// ====== QUESTION ======
function renderQuestion(){
  const c=ui[lang];
  const catObj=categories[lang].find(x=>x.key===currentCat);
  setText('q-logo',c.logo);
  setText('q-cat-label',catObj?catObj.icon+' '+catObj.label:'');
  setText('q-hint',c.hint);
  setText('q-prev',c.prev);
  setText('q-cats',c.backToCats);
  setText('q-deeper-btn',c.deeperBtn);
  setText('q-silence-btn',c.silenceBtn);
  // Clear any previous deeper hint
  document.getElementById('q-deeper').innerHTML='';
  // Deeper button visible again
  document.getElementById('q-deeper-btn').style.display='';

  let q;
  if(dailyMode){
    q=dailyQuestion;
    setText('q-counter',c.counterSingle);
    setText('q-next',c.backToCats);
    document.getElementById('q-prev').style.visibility='hidden';
  }else{
    const qs=questions[lang][currentCat];
    q=qs[currentQ];
    setText('q-counter',c.counter(currentQ+1,qs.length));
    setText('q-next',currentQ<qs.length-1?c.next:c.backToCats);
    document.getElementById('q-prev').style.visibility=currentQ===0?'hidden':'visible';
  }

  if(typing)clearInterval(typing);
  const el=document.getElementById('q-text');
  const cursor='<span class="q-cursor">|</span>';
  el.style.animation='none';el.offsetHeight;el.style.animation='slideUp .5s ease forwards';
  el.innerHTML=cursor;
  let i=0;
  typing=setInterval(()=>{
    if(i<q.length){el.innerHTML=q.slice(0,i+1)+cursor;i++;}
    else{clearInterval(typing);setTimeout(()=>{el.innerHTML=q;},2000);}
  },28);
}

function nextQ(){
  if(dailyMode){showCategories();return;}
  const qs=questions[lang][currentCat];
  if(currentQ<qs.length-1){currentQ++;renderQuestion();}
  else{showClose();}
}
function prevQ(){if(currentQ>0){currentQ--;renderQuestion();}}

// ====== GO DEEPER ======
function goDeeper(){
  const pool=deeper[lang];
  const pick=pool[Math.floor(Math.random()*pool.length)];
  const wrap=document.getElementById('q-deeper');
  wrap.innerHTML=`<p class="q-deeper-text">${pick}</p>`;
  // Hide button so it doesn't keep adding
  document.getElementById('q-deeper-btn').style.display='none';
}

// ====== SILENCE ======
let silenceReturnTo='question';

function showSilence(){
  silenceReturnTo='question';
  hideAll();
  const c=ui[lang];
  setText('s-eyebrow',c.silenceEyebrow);
  setText('s-title',c.silenceTitle);
  setText('s-min1',c.silenceMin);
  setText('s-min3',c.silenceMins);
  setText('s-min5',c.silenceMins);
  setText('s-back',c.silenceBack);
  show('screen-silence');
}

function backToQuestion(){
  hideAll();
  show('screen-question');
}

function startTimer(seconds){
  hideAll();
  const c=ui[lang];
  setText('t-skip',c.silenceSkip);
  setText('t-hint','');
  show('screen-timer');
  timerEndTime=Date.now()+seconds*1000;
  updateTimerDisplay();
  timerInterval=setInterval(updateTimerDisplay,500);
}

function updateTimerDisplay(){
  const remaining=Math.max(0,Math.ceil((timerEndTime-Date.now())/1000));
  const m=Math.floor(remaining/60);
  const s=remaining%60;
  setText('t-display',`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`);
  if(remaining<=0){
    clearInterval(timerInterval);
    completeTimer();
  }
}

function completeTimer(){
  const c=ui[lang];
  document.getElementById('t-display').innerHTML=`<span class="timer-complete">${c.silenceComplete}</span>`;
  setTimeout(()=>backToQuestion(),3500);
}

function endTimer(){
  if(timerInterval)clearInterval(timerInterval);
  backToQuestion();
}

// ====== WHISPER ======
function showWhisper(){
  hideAll();
  const c=ui[lang];
  setText('w-eyebrow',c.whisperEyebrow);
  setText('w-next',c.whisperNext);
  setText('w-back',c.backToCats);
  pickWhisper();
  show('screen-whisper');
}

function pickWhisper(){
  const pool=whispers[lang];
  let idx;
  do{idx=Math.floor(Math.random()*pool.length);}
  while(idx===lastWhisperIdx&&pool.length>1);
  lastWhisperIdx=idx;
  const el=document.getElementById('w-text');
  el.style.animation='none';el.offsetHeight;
  el.style.animation='slowFade 1.6s ease forwards';
  el.textContent=pool[idx];
}

function nextWhisper(){pickWhisper();}

// ====== CLOSE / ABOUT ======
function showClose(){
  hideAll();
  const c=ui[lang];
  setText('c-logo',c.logo);setText('c-text',c.close);
  setText('c-cats',c.moreCats);setText('c-restart',c.restart);
  show('screen-close');
}

function restart(){hideAll();show('screen-lang');window.scrollTo({top:0,behavior:'smooth'});}
function closeAbout(){hide('screen-about');show('screen-categories');}
function scrollToAboutLang(){document.getElementById('lang-about-section').scrollIntoView({behavior:'smooth'});}
function scrollToTop(){document.getElementById('lang-hero').scrollIntoView({behavior:'smooth'});}

// ====== HELPERS ======
function hideAll(){['screen-disclaimer','screen-breath','screen-categories','screen-question','screen-silence','screen-timer','screen-whisper','screen-close','screen-about'].forEach(hide);}
function show(id){const el=document.getElementById(id);el.classList.remove('hidden');if(id!=='screen-lang'){el.style.animation='none';el.offsetHeight;el.style.animation='fadeIn .9s ease forwards';}}
function hide(id){const el=document.getElementById(id);if(el)el.classList.add('hidden');}
function setText(id,t){const el=document.getElementById(id);if(el)el.textContent=t;}

// ====== PWA ======
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
