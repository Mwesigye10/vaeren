<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Væren · Tillvaron · Væren</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0d0d0b;--surface:#13120f;--border:#1e1c17;--border2:#2a2420;
    --gold:#c8b896;--gold-dim:#7a6e5a;--gold-dark:#4a4035;
    --text:#d8cfc0;--text-dim:#8a7e6e;--text-faint:#5a5040;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Lato',sans-serif;font-weight:300;min-height:100vh;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:-50%;width:200%;height:200%;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");opacity:.035;animation:grain 8s steps(10) infinite;pointer-events:none;z-index:0;}
  body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at center,transparent 30%,#0d0d0b 100%);pointer-events:none;z-index:0;}
  @keyframes grain{0%,100%{transform:translate(0,0)}10%{transform:translate(-2%,-3%)}30%{transform:translate(2%,1%)}50%{transform:translate(-1%,2%)}70%{transform:translate(3%,-1%)}90%{transform:translate(-2%,3%)}}
  @keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  @keyframes breathe{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.12}50%{transform:translate(-50%,-50%) scale(1.12);opacity:.2}}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
  @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

  .screen{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center;animation:fadeIn 1s ease forwards;}
  .hidden{display:none!important;}

  /* LANG */
  .lang-eyebrow{font-size:10px;letter-spacing:.28em;text-transform:uppercase;color:var(--text-faint);margin-bottom:48px;}
  .lang-title{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:52px;color:var(--text);letter-spacing:.06em;line-height:1;margin-bottom:56px;}
  .lang-title span{color:var(--gold-dim);}
  .lang-btns{display:flex;flex-direction:column;gap:12px;width:100%;max-width:280px;margin-bottom:40px;}
  .lang-btn{font-family:'Lato',sans-serif;font-weight:300;font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);border:1px solid var(--gold-dark);padding:16px 32px;background:transparent;cursor:pointer;transition:all .35s ease;}
  .lang-btn:hover{border-color:var(--gold-dim);background:rgba(200,184,150,.04);}
  .lang-btn-om{font-family:'Lato',sans-serif;font-weight:300;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--text-faint);border:1px solid var(--border2);padding:12px 32px;background:transparent;cursor:pointer;margin-top:8px;transition:all .35s ease;}
  .lang-btn-om:hover{color:var(--gold-dim);border-color:var(--gold-dark);}

  /* DISCLAIMER */
  .disclaimer-box{max-width:480px;width:100%;border:1px solid var(--border2);background:var(--surface);padding:40px 36px;margin:32px 0;}
  .disclaimer-title{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:13px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold-dim);margin-bottom:24px;}
  .disclaimer-text{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;font-size:17px;color:var(--text-dim);line-height:1.8;margin-bottom:20px;}
  .crisis-link{display:block;font-size:11px;letter-spacing:.12em;color:var(--text-faint);text-decoration:none;margin-top:8px;transition:color .3s;}
  .crisis-link:hover{color:var(--gold-dim);}

  /* CATEGORIES */
  .cat-eyebrow{font-size:10px;letter-spacing:.25em;text-transform:uppercase;color:var(--text-faint);margin-bottom:28px;}
  .cat-intro{font-family:'Cormorant Garamond',serif;font-weight:300;font-style:italic;font-size:24px;color:var(--text-dim);margin-bottom:40px;line-height:1.6;max-width:400px;}
  .cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:480px;width:100%;margin-bottom:12px;}
  .cat-btn{font-family:'Lato',sans-serif;font-weight:300;font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--text-dim);border:1px solid var(--border2);padding:20px 12px;background:transparent;cursor:pointer;transition:all .35s ease;line-height:1.9;}
  .cat-btn:hover{border-color:var(--gold-dark);color:var(--gold);background:rgba(200,184,150,.03);}
  .cat-btn-surprise{font-family:'Cormorant Garamond',serif;font-weight:300;font-style:italic;font-size:20px;color:var(--gold);border:1px solid var(--gold-dark);padding:22px 32px;background:transparent;cursor:pointer;transition:all .35s ease;max-width:480px;width:100%;margin-top:8px;}
  .cat-btn-surprise:hover{background:rgba(200,184,150,.05);border-color:var(--gold-dim);}

  /* QUESTIONS */
  .breath-orb{position:fixed;top:50%;left:50%;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(138,122,90,.15) 0%,transparent 70%);animation:breathe 7s ease-in-out infinite;pointer-events:none;z-index:0;}
  .q-header{display:flex;justify-content:space-between;align-items:center;width:100%;max-width:560px;margin-bottom:36px;z-index:1;}
  .q-logo{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:18px;color:var(--text-faint);letter-spacing:.1em;cursor:pointer;}
  .q-cat-label{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--text-faint);}
  .q-counter{font-size:10px;letter-spacing:.25em;text-transform:uppercase;color:var(--text-faint);margin-bottom:32px;z-index:1;}
  .q-box{max-width:520px;width:100%;z-index:1;margin-bottom:40px;}
  .q-text{font-family:'Cormorant Garamond',serif;font-weight:300;font-style:italic;font-size:clamp(22px,4vw,30px);color:var(--text);line-height:1.65;min-height:100px;}
  .q-cursor{animation:blink 1.1s infinite;color:var(--gold-dim);font-style:normal;}
  .q-hint{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:15px;color:var(--text-faint);margin-bottom:36px;z-index:1;line-height:1.7;}
  .q-nav{display:flex;align-items:center;gap:12px;z-index:1;flex-wrap:wrap;justify-content:center;}
  .q-btn{font-family:'Lato',sans-serif;font-weight:300;font-size:11px;letter-spacing:.18em;text-transform:uppercase;cursor:pointer;transition:all .35s;padding:13px 22px;border:1px solid var(--border2);background:transparent;color:var(--text-faint);}
  .q-btn:hover{color:var(--text-dim);border-color:var(--gold-dark);}
  .q-btn-gold{color:var(--gold);border-color:var(--gold-dark);}
  .q-btn-gold:hover{background:rgba(200,184,150,.05);border-color:var(--gold-dim);color:var(--gold);}
  .q-btn-cats{font-size:10px;margin-top:20px;color:var(--text-faint);border-color:var(--border);z-index:1;}

  /* CLOSE */
  .close-text{font-family:'Cormorant Garamond',serif;font-weight:300;font-style:italic;font-size:clamp(20px,3.5vw,28px);color:var(--text-dim);line-height:1.7;max-width:420px;margin-bottom:48px;}

  /* ABOUT */
  .about-box{max-width:480px;width:100%;border-left:1px solid var(--border2);padding:0 0 0 32px;margin:40px 0 48px;text-align:left;}
  .about-text{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;font-size:20px;color:var(--text-dim);line-height:1.85;margin-bottom:32px;}
  .about-sig{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:16px;color:var(--text-faint);letter-spacing:.05em;}

  .btn-ghost{font-family:'Lato',sans-serif;font-weight:300;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);border:1px solid var(--gold-dark);padding:14px 36px;background:transparent;cursor:pointer;transition:all .35s;}
  .btn-ghost:hover{border-color:var(--gold-dim);background:rgba(200,184,150,.04);}
  .logo-small{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:18px;color:var(--text-faint);letter-spacing:.1em;margin-bottom:56px;z-index:1;}
  .footer{position:fixed;bottom:20px;left:0;right:0;text-align:center;font-size:10px;letter-spacing:.1em;color:var(--border2);z-index:2;}

  @media(max-width:480px){.disclaimer-box{padding:28px 24px}.cat-grid{grid-template-columns:1fr}.about-box{padding-left:20px}}
</style>
</head>
<body>

<!-- LANG SCREEN -->
<div id="screen-lang">
  <div class="screen" id="lang-hero" style="min-height:100vh;">
    <p class="lang-eyebrow">Vælg dit sprog · Välj ditt språk · Velg ditt språk</p>
    <h1 class="lang-title">Væren<span> · </span>Tillvaron</h1>
    <div class="lang-btns">
      <button class="lang-btn" onclick="setLang('da')">Dansk</button>
      <button class="lang-btn" onclick="setLang('sv')">Svenska</button>
      <button class="lang-btn" onclick="setLang('no')">Norsk</button>
      <button class="lang-btn-om" onclick="scrollToAboutLang()">Om ↓</button>
    </div>
  </div>
  <div id="lang-about-section" style="position:relative;z-index:1;max-width:480px;margin:0 auto;padding:80px 24px 120px;text-align:left;">
    <p style="font-size:10px;letter-spacing:.25em;text-transform:uppercase;color:#4a4035;margin-bottom:40px;font-family:'Lato',sans-serif;font-weight:300;">Om · About</p>
    <div style="border-left:1px solid #2a2420;padding-left:32px;">
      <p id="lang-about-text" style="font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;font-size:20px;color:#8a7e6e;line-height:1.85;margin-bottom:32px;">Jeg er selv undervejs. Denne app er min invitation til at undersøge det sammen.</p>
      <p style="font-family:'Cormorant Garamond',serif;font-weight:300;font-size:16px;color:#4a4035;letter-spacing:.05em;">— Nicholas Mwesigye</p>
    </div>
    <div style="margin-top:60px;text-align:center;">
      <button onclick="scrollToTop()" style="font-family:'Lato',sans-serif;font-weight:300;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:#4a4035;background:none;border:none;cursor:pointer;">↑ Tilbage til sprog</button>
    </div>
  </div>
</div>

<!-- DISCLAIMER -->
<div id="screen-disclaimer" class="screen hidden">
  <p class="lang-eyebrow" id="d-eyebrow"></p>
  <div class="disclaimer-box">
    <p class="disclaimer-title" id="d-title"></p>
    <p class="disclaimer-text" id="d-text"></p>
    <p class="disclaimer-text" id="d-crisis-label"></p>
    <a class="crisis-link" id="d-crisis-dk" href="https://livslinjen.dk" target="_blank" rel="noopener"></a>
    <a class="crisis-link" id="d-crisis-se" href="https://mind.se" target="_blank" rel="noopener"></a>
    <a class="crisis-link" id="d-crisis-no" href="https://mentalhelse.no" target="_blank" rel="noopener"></a>
  </div>
  <button class="btn-ghost" id="d-btn" onclick="showCategories()"></button>
</div>

<!-- CATEGORIES -->
<div id="screen-categories" class="screen hidden">
  <p class="cat-eyebrow" id="cat-eyebrow"></p>
  <p class="cat-intro" id="cat-intro"></p>
  <div class="cat-grid" id="cat-grid"></div>
  <button class="cat-btn-surprise" id="cat-surprise" onclick="surpriseMe()"></button>
</div>

<!-- QUESTIONS -->
<div id="screen-question" class="screen hidden" style="justify-content:flex-start;padding-top:48px;">
  <div class="breath-orb"></div>
  <div class="q-header">
    <span class="q-logo" id="q-logo" onclick="showCategories()"></span>
    <span class="q-cat-label" id="q-cat-label"></span>
  </div>
  <p class="q-counter" id="q-counter"></p>
  <div class="q-box">
    <p class="q-text" id="q-text"><span class="q-cursor">|</span></p>
  </div>
  <p class="q-hint" id="q-hint"></p>
  <div class="q-nav">
    <button class="q-btn" id="q-prev" onclick="prevQ()"></button>
    <button class="q-btn q-btn-gold" id="q-next" onclick="nextQ()"></button>
  </div>
  <button class="q-btn q-btn-cats" id="q-cats" onclick="showCategories()"></button>
</div>

<!-- CLOSE -->
<div id="screen-close" class="screen hidden">
  <p class="logo-small" id="c-logo"></p>
  <p class="close-text" id="c-text"></p>
  <div style="display:flex;gap:16px;flex-wrap:wrap;justify-content:center;">
    <button class="btn-ghost" id="c-cats" onclick="showCategories()"></button>
    <button class="btn-ghost" id="c-restart" onclick="restart()" style="color:var(--text-faint);border-color:var(--border2);font-size:10px;"></button>
  </div>
</div>

<!-- ABOUT -->
<div id="screen-about" class="screen hidden">
  <p class="logo-small" id="a-logo"></p>
  <div class="about-box">
    <p class="about-text" id="a-text"></p>
    <p class="about-sig">— Nicholas Mwesigye</p>
  </div>
  <button class="btn-ghost" id="a-back" onclick="closeAbout()"></button>
</div>

<div class="footer" id="footer-text"></div>

<script>
const categories = {
  da:[
    {key:'selvindsigt',icon:'🌿',label:'Selvindsigt',desc:'Hvem er du egentlig?'},
    {key:'frygt',icon:'🌑',label:'Frygt',desc:'Hvad holder dig tilbage?'},
    {key:'tid',icon:'⏳',label:'Tanken & tiden',desc:'Fortid, fremtid og nu'},
    {key:'sind',icon:'🧠',label:'Sindet',desc:'Hvad er dit eget?'},

  ],

    {key:'frygt',icon:'🌑',label:'Rädsla',desc:'Vad håller dig tillbaka?'},
    {key:'tid',icon:'⏳',label:'Tanken & tiden',desc:'Dåtid, framtid och nu'},
    {key:'sind',icon:'🧠',label:'Sinnet',desc:'Vad är ditt eget?'},
    {key:'forhold',icon:'🤝',label:'Relationer',desc:'Att se en annan människa'},
    {key:'ensomhed',icon:'🌌',label:'Ensamhet',desc:'Att vara med sig själv'},
    {key:'kaerlighed',icon:'💛',label:'Kärlek',desc:'Utan villkor'},
    {key:'frihed',icon:'🕊️',label:'Frihet',desc:'Vad faller bort?'},
  ],
  no:[
    {key:'selvindsigt',icon:'🌿',label:'Selvinnsikt',desc:'Hvem er du egentlig?'},
    {key:'frygt',icon:'🌑',label:'Frykt',desc:'Hva holder deg tilbake?'},
    {key:'tid',icon:'⏳',label:'Tanken & tiden',desc:'Fortid, fremtid og nå'},
    {key:'sind',icon:'🧠',label:'Sinnet',desc:'Hva er ditt eget?'},
    {key:'forhold',icon:'🤝',label:'Relasjoner',desc:'Å se et annet menneske'},
    {key:'ensomhed',icon:'🌌',label:'Ensomhet',desc:'Å være med seg selv'},
    {key:'kaerlighed',icon:'💛',label:'Kjærlighet',desc:'Uten betingelser'},
    {key:'frihed',icon:'🕊️',label:'Frihet',desc:'Hva faller bort?'},
  ]
};

const questions = {
  da:{
    selvindsigt:["Hvad sker der, når du for et øjeblik holder op med at forsøge at blive til noget?","Er der et 'dig', der observerer dine tanker – eller er observatøren og tanken det samme?","Hvornår sidst oplevede du noget uden straks at navngive det?","Hvad ville forsvinde, hvis du lod din selvfortælling hvile i ét minut?","Hvem er du, når ingen kigger – heller ikke du selv?","Hvis du ikke måtte kalde dig selv noget – intet navn, ingen rolle – hvad er der så tilbage?"],
    frygt:["Hvad er du bange for at opdage, hvis du ser helt ind i dig selv?","Er frygten noget der sker for dig – eller noget du opretholder?","Hvad ville du gøre, hvis du ikke var bange for andres mening?","Er din angst noget, du oplever – eller noget du er?","Hvad holder dig fra at være helt til stede i dette øjeblik?"],
    tid:["Er dit problem nu – eller er det en tanke om fortiden eller fremtiden?","Kan du mærke forskellen på en tanke og en oplevelse?","Hvornår holdt du sidst op med at planlægge og bare var?","Kan du iagttage en tanke, uden at blive den?","Er den ro du søger noget, du kan nå – eller noget der allerede er der, når jagten stopper?"],
    sind:["Hvem lærte dig hvem du skulle være – og tog du det som sandhed?","Hvad af det du tror på dig selv, har du selv undersøgt?","Er dine reaktioner dine egne – eller er de arvet?","Hvad er stilhed for dig – fravær af lyd, eller fravær af noget andet?","Hvem besluttede, hvem du skulle blive?"],
    forhold:["Ser du det andet menneske – eller ser du din idé om dem?","Hvad sker der i et forhold, når begge holder op med at kræve noget?","Kan du lytte til et andet menneske uden at forberede dit svar?","Er der forskel på den, der søger fred, og den, der allerede er i fred?","Hvad er forskellen på at tænke over livet og at leve det?"],
    ensomhed:["Er du nogensinde helt alene med dig selv – uden at fylde stilheden?","Hvad sker der, hvis du ikke flygter fra ensomheden, men går ind i den?","Er der forskel på at være alene og at være ensom?","Er din ensomhed noget, du oplever – eller noget du er?","Kan du mærke, at din vejrtrækning sker af sig selv, uden at du beslutter det?"],
    kaerlighed:["Har du nogensinde elsket uden at forvente noget til gengæld?","Er den kærlighed du giver betinget af hvordan du selv har det?","Hvad ville kærlighed være, hvis der intet 'jeg' var der til at give den?","Kan du elske uden at ville eje eller forandre?","Er kærlighed noget du finder – eller noget der opstår, når noget falder væk?"],
    frihed:["Er frihed noget du opnår – eller noget der opstår når noget falder væk?","Hvad ville du gøre i dag, hvis du vidste at ingen dømte dig?","Er det muligt at være fri, mens du stadig definerer dig selv?","Hvad binder dig mest – verden udenfor eller tanken indenfor?","Hvad er forskellen på frihed og flugt?"],
  },
  sv:{
    selvindsigt:["Vad händer när du för ett ögonblick slutar försöka bli något?","Finns det ett 'du' som observerar dina tankar – eller är observatören och tanken samma sak?","När upplevde du senast något utan att omedelbart sätta ett namn på det?","Vad skulle försvinna om du lät din självberättelse vila i en minut?","Vem är du när ingen tittar – inte ens du själv?","Om du inte fick kalla dig något – inget namn, ingen roll – vad finns kvar?"],
    frygt:["Vad är du rädd för att upptäcka om du ser riktigt djupt in i dig själv?","Är rädslan något som händer dig – eller något du upprätthåller?","Vad skulle du göra om du inte var rädd för andras åsikter?","Är din ångest något du upplever – eller något du är?","Vad hindrar dig från att vara helt närvarande i detta ögonblick?"],
    tid:["Är ditt problem nu – eller är det en tanke om det förflutna eller framtiden?","Kan du känna skillnaden mellan en tanke och en upplevelse?","När slutade du senast att planera och bara var?","Kan du iaktta en tanke utan att bli den?","Är den ro du söker något du kan nå – eller något som redan finns där när jakten upphör?"],
    sind:["Vem lärde dig vem du skulle vara – och tog du det som sanning?","Vad av det du tror om dig själv har du själv undersökt?","Är dina reaktioner dina egna – eller är de ärvda?","Vad är stillhet för dig – frånvaro av ljud, eller frånvaro av något annat?","Vem bestämde vem du skulle bli?"],
    forhold:["Ser du den andra människan – eller ser du din idé om henne?","Vad händer i en relation när båda slutar kräva något?","Kan du lyssna på en annan människa utan att förbereda ditt svar?","Är det någon skillnad mellan den som söker fred och den som redan är i fred?","Vad är skillnaden mellan att tänka på livet och att leva det?"],
    ensomhed:["Är du någonsin helt ensam med dig själv – utan att fylla stillheten?","Vad händer om du inte flyr från ensamheten utan går in i den?","Är det skillnad på att vara ensam och att känna sig ensam?","Är din ensamhet något du upplever – eller något du är?","Kan du känna att din andning sker av sig själv, utan att du bestämmer det?"],
    kaerlighed:["Har du någonsin älskat utan att förvänta dig något tillbaka?","Är den kärlek du ger beroende av hur du själv mår?","Vad skulle kärlek vara om det inte fanns något 'jag' där för att ge den?","Kan du älska utan att vilja äga eller förändra?","Är kärlek något du hittar – eller något som uppstår när något faller bort?"],
    frihed:["Är frihet något du uppnår – eller något som uppstår när något faller bort?","Vad skulle du göra idag om du visste att ingen dömde dig?","Är det möjligt att vara fri medan du fortfarande definierar dig själv?","Vad binder dig mest – världen utanför eller tanken innanför?","Vad är skillnaden mellan frihet och flykt?"],

let lang='da', currentQ=0, currentCat=null, lastSurpriseCat=null, typing=null;
const catKeys=['selvindsigt','frygt','tid','sind','forhold','ensomhed','kaerlighed','frihed'];

function setLang(l){
  lang=l;
  const t={da:"Jeg er selv undervejs. Denne app er min invitation til at undersøge det sammen.",sv:"Jag är själv på väg. Den här appen är min inbjudan att undersöka det tillsammans.",no:"Jeg er selv underveis. Denne appen er min invitasjon til å undersøke det sammen."};
  document.getElementById('lang-about-text').textContent=t[l];
  showDisclaimer();
}

function showDisclaimer(){
  hide('screen-lang');
  const d=ui[lang].disclaimer;
  setText('d-eyebrow',d.eyebrow);setText('d-title',d.title);setText('d-text',d.text);
  setText('d-crisis-label',d.crisisLabel);setText('d-crisis-dk',d.crisisDk);
  setText('d-crisis-se',d.crisisSe);setText('d-crisis-no',d.crisisNo);setText('d-btn',d.btn);
  setText('footer-text',ui[lang].footer);
  show('screen-disclaimer');
}

function showCategories(){
  hideAll();
  const c=ui[lang], cats=categories[lang];
  setText('cat-eyebrow',c.catEyebrow);setText('cat-intro',c.catIntro);setText('cat-surprise',c.surprise);
  const grid=document.getElementById('cat-grid');
  grid.innerHTML='';
  cats.forEach(cat=>{
    const btn=document.createElement('button');
    btn.className='cat-btn';
    btn.innerHTML=`${cat.icon}<br>${cat.label}<br><span style="font-size:9px;color:var(--text-faint);letter-spacing:.1em;">${cat.desc}</span>`;
    btn.onclick=()=>startCategory(cat.key);
    grid.appendChild(btn);
  });
  show('screen-categories');
}

function surpriseMe(){
  const available=catKeys.filter(k=>k!==lastSurpriseCat);
  const pick=available[Math.floor(Math.random()*available.length)];
  lastSurpriseCat=pick;
  // Shuffle questions for this category
  const qs=[...questions[lang][pick]];
  for(let i=qs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[qs[i],qs[j]]=[qs[j],qs[i]];}
  questions[lang][pick]=qs;
  startCategory(pick);
}

function startCategory(catKey){
  currentCat=catKey; currentQ=0;
  renderQuestion();
  show('screen-question');
}

function renderQuestion(){
  const c=ui[lang], qs=questions[lang][currentCat];
  const catObj=categories[lang].find(x=>x.key===currentCat);
  setText('q-logo',c.logo);
  setText('q-cat-label',catObj?catObj.icon+' '+catObj.label:'');
  setText('q-counter',c.counter(currentQ+1,qs.length));
  setText('q-hint',c.hint);
  setText('q-prev',c.prev);
  setText('q-next',currentQ<qs.length-1?c.next:c.backToCats);
  setText('q-cats',c.backToCats);
  document.getElementById('q-prev').style.visibility=currentQ===0?'hidden':'visible';
  if(typing)clearInterval(typing);
  const el=document.getElementById('q-text');
  const cursor='<span class="q-cursor">|</span>';
  el.style.animation='none';el.offsetHeight;el.style.animation='slideUp .5s ease forwards';
  el.innerHTML=cursor;
  const q=qs[currentQ];let i=0;
  typing=setInterval(()=>{
    if(i<q.length){el.innerHTML=q.slice(0,i+1)+cursor;i++;}
    else{clearInterval(typing);setTimeout(()=>{el.innerHTML=q;},2000);}
  },28);
}

function nextQ(){const qs=questions[lang][currentCat];if(currentQ<qs.length-1){currentQ++;renderQuestion();}else{showClose();}}
function prevQ(){if(currentQ>0){currentQ--;renderQuestion();}}

function showClose(){
  hideAll();
  const c=ui[lang];
  setText('c-logo',c.logo);setText('c-text',c.close);setText('c-cats',c.moreCats);setText('c-restart',c.restart);
  show('screen-close');
}

function restart(){hideAll();show('screen-lang');window.scrollTo({top:0,behavior:'smooth'});}
function closeAbout(){hide('screen-about');show('screen-categories');}
function scrollToAboutLang(){document.getElementById('lang-about-section').scrollIntoView({behavior:'smooth'});}
function scrollToTop(){document.getElementById('lang-hero').scrollIntoView({behavior:'smooth'});}

function hideAll(){['screen-disclaimer','screen-categories','screen-question','screen-close','screen-about'].forEach(hide);}
function show(id){const el=document.getElementById(id);el.classList.remove('hidden');if(id!=='screen-lang'){el.style.animation='none';el.offsetHeight;el.style.animation='fadeIn .9s ease forwards';}}
function hide(id){document.getElementById(id).classList.add('hidden');}
function setText(id,t){const el=document.getElementById(id);if(el)el.textContent=t;}
</script>
